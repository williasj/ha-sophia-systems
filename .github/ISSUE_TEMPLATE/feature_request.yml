name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe it clearly so we can evaluate it.

  - type: dropdown
    id: module
    attributes:
      label: Which Module
      description: Which SOPHIA module does this feature apply to?
      options:
        - SOPHIA Core
        - SOPHIA Climate
        - SOPHIA Systems
        - SOPHIA Presence
        - New Module (please describe)
        - All Modules
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Use Case
      description: What problem does this feature solve? What are you trying to do?
      placeholder: "I want to be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
      placeholder: "It would be great if SOPHIA could..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you have considered?
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this has not already been requested
          required: true
        - label: This feature aligns with SOPHIA's local-first, no cloud-dependency philosophy
          required: false
